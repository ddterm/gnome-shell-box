name: box

on:
  workflow_dispatch:
    inputs:
      name:
        description: 'Box to build'
        type: string
        required: true

      publish:
        description: 'Publish to Vagrant Registry'
        type: boolean
        default: false
        required: false

  workflow_call:
    inputs:
      name:
        description: 'Box to build'
        type: string
        required: true

      publish:
        description: 'Publish to Vagrant Registry'
        type: boolean
        default: false
        required: false

    secrets:
      HCP_CLIENT_SECRET:
        description: 'HCP service principal client secret for publishing'
        required: false

env:
  # renovate: datasource=deb depName=packer
  PACKER_VERSION: '1.15.0-1'
  # renovate: datasource=deb depName=vagrant
  VAGRANT_VERSION: '2.4.9-1'

defaults:
  run:
    shell: bash

jobs:
  build:
    name: build ${{ inputs.name }}
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-hashicorp-repo

      - run: >-
          sudo apt-get install -y --no-install-recommends
          "packer=$PACKER_VERSION"
          qemu-system-x86
          qemu-system-modules-spice
          qemu-utils
          dnsmasq

      - uses: ./.github/actions/clean
      - uses: ./.github/actions/enable-kvm
      - run: mkdir -p logs

      - run: /usr/bin/packer init .
        env:
          PACKER_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - run: >-
          /usr/bin/packer build
          ${{ case(inputs.publish, '', '-except vagrant-registry') }}
          -only "$BUILD_NAME"
          .
          2>&1 | tee logs/packer.txt
        env:
          HCP_CLIENT_ID: ${{ vars.HCP_CLIENT_ID }}
          HCP_CLIENT_SECRET: ${{ secrets.HCP_CLIENT_SECRET }}
          PACKER_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PACKER_LOG: 1
          BUILD_NAME: qemu.${{ inputs.name }}

      - run: du -h ./*.box
      - run: mv ./*.box "${BOX_NAME}"
        env:
          BOX_NAME: ${{ inputs.name }}.box

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          path: ${{ inputs.name }}.box
          retention-days: 1
          archive: false

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ${{ inputs.name }}-build-logs
          path: logs
        if: ${{ always() }}

  test:
    name: test ${{ inputs.name }}
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    env:
      VAGRANT_BOX_UPDATE_CHECK_DISABLE: 1
      VAGRANT_CHECKPOINT_DISABLE: 1
      VAGRANT_FORCE_COLOR: 1

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            .github/**
            test/**

      - uses: ./.github/actions/setup-hashicorp-repo

      - run: >-
          sudo apt-get install -y --no-install-recommends
          "vagrant=$VAGRANT_VERSION"
          qemu-system-x86
          qemu-system-modules-spice
          qemu-utils
          libvirt-daemon-system
          libvirt-dev
          dnsmasq
          imagemagick

      - uses: ./.github/actions/clean
      - uses: ./.github/actions/enable-kvm
      - run: vagrant plugin install --verbose vagrant-libvirt

      - uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: ${{ inputs.name }}.box
          skip-decompress: true

      - run: vagrant box add --clean --force --no-tty --name "$BOX_NAME" ./*.box
        env:
          BOX_NAME: ${{ inputs.name }}

      - run: rm ./*.box

      - run: vagrant init --template test/Vagrantfile.erb "$BOX_NAME"
        env:
          BOX_NAME: ${{ inputs.name }}

      - uses: ./.github/actions/setup-qemu-bridge
      - run: mkdir -p logs
      - run: vagrant up --no-tty --debug 2>&1 | tee logs/vagrant.txt

      - id: virt_domain_name
        run: echo "virt_domain_name=$(virsh --connect=qemu:///session --quiet list --name)" >>"$GITHUB_OUTPUT"

      - run: sleep 30

      - id: screenshot
        run: virsh --connect=qemu:///session screenshot "$VIRT_DOMAIN_NAME" --file "$SCREENSHOT"
        env:
          VIRT_DOMAIN_NAME: ${{ steps.virt_domain_name.outputs.virt_domain_name }}
          SCREENSHOT: logs/${{ inputs.name }}.png

      - run: vagrant destroy --force --graceful

      - run: compare -crop '1280x768+0+32' "$SCREENSHOT" "$REF_IMAGE" "$SCREENSHOT_DIFF"
        env:
          REF_IMAGE: test/ref/${{ inputs.name }}.png
          SCREENSHOT: logs/${{ inputs.name }}.png
          SCREENSHOT_DIFF: logs/${{ inputs.name }}-diff.png

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          path: logs/${{ inputs.name }}.png
          archive: false
        if: ${{ always() && steps.screenshot.outcome == 'success' }}

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          path: logs/${{ inputs.name }}-diff.png
          archive: false
        if: ${{ always() && steps.screenshot.outcome == 'success' }}

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ${{ inputs.name }}-test-logs
          path: logs
        if: ${{ always() }}
